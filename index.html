<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Mailman</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* --- Animations --- */
        @keyframes popIn {
            0% { opacity: 0; transform: translateY(15px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes bounceSmiley {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        /* --- Mailman Animation --- */
        #mailman-container {
            position: absolute;
            left: -200px;
            bottom: 15%; /* Adjusted slightly for mobile headroom */
            transition: left 4s linear; 
            text-align: center;
            transform: translateX(-50%);
            width: 100%;
            max-width: 300px;
        }

        .mailman-svg {
            height: 45vh; /* Scales relative to screen height */
            max-height: 400px;
            width: auto;
        }

        .speech-bubble {
            background: white;
            padding: 10px;
            border-radius: 15px;
            border: 2px solid #333;
            margin-bottom: 10px;
            position: relative;
            display: none;
            font-weight: bold;
            color: #2C3E50;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            font-size: 16px;
            width: max-content;
            margin-left: auto;
            margin-right: auto;
        }

        /* --- Buttons --- */
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 50px;
            border: none;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
            margin: 10px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .btn:hover { transform: scale(1.1); }
        
        #get-mail-btn { background-color: #ff9800; display: none; z-index: 10; position: relative; }
        #get-mail-btn:hover { background-color: #f57c00; }

        .btn-yes { background-color: #4CAF50; }
        .btn-yes:hover { background-color: #388E3C; }
        
        .btn-no { background-color: #F44336; }
        .btn-no:hover { background-color: #D32F2F; }

        .btn-blue { background-color: #3498db; }
        .btn-blue:hover { background-color: #2980b9; }

        /* --- Main Content Card --- */
        #main-card {
            display: none;
            text-align: center;
            background: white;
            width: 90%; /* Fluid width for mobile */
            max-width: 500px;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            position: relative;
            box-sizing: border-box;
            animation: popIn 0.6s ease-out forwards;
        }

        .section { display: none; animation: popIn 0.5s ease-out forwards; }

        h2 { color: #2C3E50; margin-bottom: 20px; }
        .highlight-text { color: #d35400; font-size: 24px; font-weight: bold; margin-bottom: 20px; }

        /* --- Biryani --- */
        #biryani-img {
            width: 100%;
            max-width: 300px; /* Prevents overflow on tiny screens */
            height: auto;
            cursor: pointer;
            border-radius: 15px;
            transition: filter 0.3s, transform 0.2s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        #biryani-img:hover {
            filter: brightness(1.1);
            transform: scale(1.03);
        }
        .click-hint { color: #7f8c8d; font-weight: bold; margin-top: 15px; font-size: 18px; }

        /* --- Error Prompt --- */
        .error-prompt {
            border: 2px solid #f44336;
            background-color: #ffebee;
            color: #d32f2f;
            padding: 20px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 20px;
            display: inline-block;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- End Screen --- */
        .huge-smiley {
            font-size: 120px;
            margin: 20px 0;
            animation: bounceSmiley 2s ease-in-out infinite;
        }
        .end-text { font-size: 32px; color: #2e7d32; font-weight: bold; margin-bottom: 0; }
        .funny-note {
            font-size: 18px;
            color: #95a5a6;
            margin-top: 20px;
            font-style: italic;
            border-top: 1px dashed #bdc3c7;
            padding-top: 15px;
        }

        /* --- Responsive Tweaks for Mobile --- */
        @media (max-width: 480px) {
            #main-card { padding: 30px 15px; }
            h2 { font-size: 22px; }
            .highlight-text { font-size: 20px; }
            .end-text { font-size: 24px; }
            .huge-smiley { font-size: 80px; }
            .funny-note { font-size: 15px; }
            .error-prompt { font-size: 16px; padding: 15px 20px; }
            .btn { padding: 12px 24px; font-size: 16px; margin: 5px; }
            .speech-bubble { font-size: 14px; padding: 8px; }
        }

        /* --- SVG Internal Styles --- */
        .left-leg { transform-origin: 93px 195px; animation: left-leg-anim 10s linear infinite; }
        .right-leg { transform-origin: 108px 195px; animation: right-leg-anim 10s linear infinite; }
        .left-arm { transform-origin: 93px 125px; animation: left-arm-anim 10s linear infinite; }
        .right-arm { transform-origin: 106px 125px; animation: right-arm-anim 10s linear infinite; }
        .bounce { animation: body-bounce 10s linear infinite; }
        .face-features { animation: face-features-anim 10s ease-in-out infinite; }
        .ear { animation: ear-anim 10s ease-in-out infinite; }
        .front-eye { animation: front-eye-anim 10s ease-in-out infinite; }

        @keyframes left-leg-anim { 0%, 10%, 20%, 30%, 40%, 70%, 80%, 90%, 100% { transform: rotate(35deg); } 5%, 15%, 25%, 35%, 75%, 85%, 95% { transform: rotate(-35deg); } 42%, 68% { transform: rotate(0deg); } }
        @keyframes right-leg-anim { 0%, 10%, 20%, 30%, 40%, 70%, 80%, 90%, 100% { transform: rotate(-35deg); } 5%, 15%, 25%, 35%, 75%, 85%, 95% { transform: rotate(35deg); } 42%, 68% { transform: rotate(0deg); } }
        @keyframes right-arm-anim { 0%, 10%, 20%, 30%, 40%, 70%, 80%, 90%, 100% { transform: rotate(35deg); } 5%, 15%, 25%, 35%, 75%, 85%, 95% { transform: rotate(-35deg); } 42%, 68% { transform: rotate(0deg); } }
        @keyframes left-arm-anim { 0%, 10%, 20%, 30% { transform: rotate(-35deg); } 5%, 15%, 25%, 35% { transform: rotate(35deg); } 40% { transform: rotate(0deg); } 43%, 67% { transform: rotate(-150deg); } 47%, 55%, 63% { transform: rotate(-110deg); } 51%, 59% { transform: rotate(-160deg); } 70%, 80%, 90%, 100% { transform: rotate(-35deg); } 75%, 85%, 95% { transform: rotate(35deg); } }
        @keyframes body-bounce { 0%, 5%, 10%, 15%, 20%, 25%, 30%, 35%, 40%, 70%, 75%, 80%, 85%, 90%, 95%, 100% { transform: translateY(4px); } 2.5%, 7.5%, 12.5%, 17.5%, 22.5%, 27.5%, 32.5%, 37.5%, 72.5%, 77.5%, 82.5%, 87.5%, 92.5%, 97.5% { transform: translateY(-2px); } 42%, 68% { transform: translateY(0px); } }
        @keyframes face-features-anim { 0%, 40% { transform: translateX(0px); } 43%, 67% { transform: translateX(-10px); } 70%, 100% { transform: translateX(0px); } }
        @keyframes ear-anim { 0%, 40% { transform: translateX(0px); opacity: 1; } 43%, 67% { transform: translateX(5px); opacity: 0; } 70%, 100% { transform: translateX(0px); opacity: 1; } }
        @keyframes front-eye-anim { 0%, 40% { opacity: 0; } 43%, 67% { opacity: 1; } 70%, 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="mailman-container">
        <div class="speech-bubble" id="bubble">Your local Mailbox is Here! 📬</div>
        
        <svg class="mailman-svg" xmlns="http://www.w3.org/2000/svg" viewBox="60 50 90 230">
            <g id="postman-wrapper">
                <g id="legs">
                    <g id="right-leg" class="limb right-leg"><rect x="100" y="190" width="16" height="80" rx="8" fill="#1A252F" /><path d="M 100 265 H 125 A 5 5 0 0 1 130 270 V 275 H 100 Z" fill="#111111" /></g>
                    <g id="left-leg" class="limb left-leg"><rect x="85" y="190" width="16" height="80" rx="8" fill="#2C3E50" /><path d="M 85 265 H 110 A 5 5 0 0 1 115 270 V 275 H 85 Z" fill="#222222" /></g>
                </g>
                <g id="upper-half" class="bounce">
                    <g id="right-arm" class="limb right-arm"><rect x="100" y="120" width="12" height="60" rx="6" fill="#357ABD" /><circle cx="106" cy="180" r="7" fill="#F2B880" /></g>
                    <g id="torso"><rect x="80" y="110" width="36" height="95" rx="12" fill="#4A90E2" /><path d="M 98 110 H 104 A 12 12 0 0 1 116 122 V 193 A 12 12 0 0 1 104 205 H 98 Z" fill="#357ABD" /><rect x="90" y="100" width="16" height="15" fill="#FADCB3" /><path d="M 85 110 L 98 125 L 110 110" fill="#2C3E50" opacity="0.1" /></g>
                    <g id="head"><circle cx="98" cy="85" r="18" fill="#FADCB3" /><circle cx="86" cy="88" r="4" fill="#F2B880" class="ear" /><circle cx="88" cy="80" r="2.5" fill="#2C3E50" class="front-eye" /><g class="face-features"><circle cx="116" cy="85" r="4" fill="#F2B880" /><circle cx="108" cy="80" r="2.5" fill="#2C3E50" /><path d="M 112 80 Q 125 80 130 85" stroke="#111111" stroke-width="4" stroke-linecap="round" fill="none" /></g><path d="M 78 80 A 20 18 0 0 1 118 80 Z" fill="#2C3E50" /><path d="M 98 62 A 20 18 0 0 1 118 80 H 100 Z" fill="#1A252F" /><circle cx="98" cy="72" r="3" fill="#F1C40F" /></g>
                    <g id="mail-bag"><path d="M 83 115 L 112 170" stroke="#873600" stroke-width="6" stroke-linecap="round" /><g transform="rotate(12 115 160)"><rect x="110" y="145" width="24" height="18" fill="#FFFFFF" rx="1" /><path d="M 110 145 L 122 154 L 134 145" stroke="#D0D3D4" stroke-width="1.5" fill="none" /><circle cx="122" cy="154" r="2" fill="#E74C3C" /></g><rect x="96" y="165" width="40" height="34" rx="6" fill="#D35400" /><path d="M 116 165 H 130 A 6 6 0 0 1 136 171 V 193 A 6 6 0 0 1 130 199 H 116 Z" fill="#A04000" /><path d="M 96 165 L 116 185 L 136 165 Z" fill="#A04000" /><circle cx="116" cy="180" r="2.5" fill="#F1C40F" /></g>
                    <g id="left-arm" class="limb left-arm"><rect x="86" y="120" width="14" height="65" rx="7" fill="#4A90E2" /><circle cx="93" cy="183" r="7" fill="#FADCB3" /><rect x="85" y="145" width="16" height="4" fill="#357ABD" /></g>
                </g>
            </g>
        </svg>
    </div>

    <button class="btn" id="get-mail-btn" onclick="openMail()">Open Mail!</button>

    <div id="main-card">
        
        <div id="section-question" class="section">
            <h2>Fud kazhicho? 🍛</h2>
            <div>
                <button class="btn btn-yes" onclick="answerYes()">Yes</button>
                <button class="btn btn-no" onclick="answerNo()">No</button>
            </div>
        </div>

        <div id="section-yes-intermediate" class="section">
            <div class="highlight-text">We can eat once again</div>
            <button class="btn btn-blue" onclick="clickHere()">Click Here!</button>
        </div>

        <div id="section-biryani" class="section">
            <img id="biryani-img" src="https://s.yimg.com/zb/imgv1/01fd5113-5f0a-3266-ab94-14e8a14a5ece/t_500x300" alt="Delicious Biryani" onclick="triggerError()">
            <p class="click-hint">Click on the biryani</p>
        </div>

        <div id="section-error" class="section">
            <div class="error-prompt">
                ⚠️ Pineapple not found! I am sorry
            </div>
        </div>

        <div id="section-end" class="section">
            <h2 class="end-text">Always keep on smiling like this!</h2>
            <div class="huge-smiley">😁</div>
            <p class="funny-note">P.S. Please don't get mad over this ... 🏃‍♂️💨</p>
        </div>

    </div>

    <script>
        // Start Mailman Animation
        window.onload = () => {
            const mailman = document.getElementById('mailman-container');
            const bubble = document.getElementById('bubble');
            const btn = document.getElementById('get-mail-btn');

            setTimeout(() => { mailman.style.left = '50%'; }, 100);
            setTimeout(() => { bubble.style.display = 'block'; }, 4200);
            setTimeout(() => { btn.style.display = 'block'; }, 5000);
        };

        // Open the card and hide the mailman
        function openMail() {
            document.getElementById('mailman-container').style.display = 'none';
            document.getElementById('get-mail-btn').style.display = 'none';
            
            document.getElementById('main-card').style.display = 'block';
            document.getElementById('section-question').style.display = 'block';
        }

        // --- Logic for answering "Yes" ---
        function answerYes() {
            document.getElementById('section-question').style.display = 'none';
            document.getElementById('section-yes-intermediate').style.display = 'block';
        }

        function clickHere() {
            document.getElementById('section-yes-intermediate').style.display = 'none';
            document.getElementById('section-biryani').style.display = 'block';
        }

        // --- Logic for answering "No" ---
        function answerNo() {
            document.getElementById('section-question').style.display = 'none';
            document.getElementById('section-biryani').style.display = 'block';
        }

        // --- Click Biryani to Trigger Error, then End Screen ---
        function triggerError() {
            document.getElementById('section-biryani').style.display = 'none';
            document.getElementById('section-error').style.display = 'block';

            // Wait 2 seconds, then show the final smiley message
            setTimeout(() => {
                document.getElementById('section-error').style.display = 'none';
                document.getElementById('section-end').style.display = 'block';
            }, 2000);
        }
    </script>
</body>
</html>
